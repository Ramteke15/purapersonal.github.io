<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PuraPersonal | Event Hydration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --gold: #b2945e;
            --charcoal: #1a1a1a;
            --off-white: #ffffff;
            --soft-grey: #f9f9f9;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Georgia', serif;
            background-color: #f8f8f8;
            color: var(--charcoal);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 15px;
            box-sizing: border-box;
        }

        .luxury-card {
            background: var(--off-white);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
        }

        .lookbook-label {
            font-size: 0.55rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ccc;
            display: block;
            text-align: left;
            margin-bottom: 20px;
        }

        .gallery-container {
            position: relative;
            width: 100%;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .gallery-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding-bottom: 15px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            padding-left: 2px;
        }
        .gallery-scroll::-webkit-scrollbar { display: none; }

        .gallery-item {
            min-width: 260px;
            height: 260px;
            background-color: #fdfdfd;
            border: 1px solid #f0f0f0;
            object-fit: cover;
            scroll-snap-align: center;
        }

        .pagination-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .dot {
            width: 5px;
            height: 5px;
            background-color: #e0e0e0;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dot.active {
            background-color: var(--gold);
            transform: scale(1.6);
        }

        h2 {
            font-weight: 300;
            letter-spacing: 7px;
            text-transform: uppercase;
            margin-bottom: 35px;
            font-size: 1.1rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 10px;
            color: #aaa;
        }

        input, select {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid #eaeaea;
            background: transparent;
            font-size: 1.05rem;
            color: var(--charcoal);
            outline: none;
            font-family: 'Georgia', serif;
            border-radius: 0;
            -webkit-appearance: none;
        }

        .primary-btn {
            width: 100%;
            padding: 20px;
            background-color: var(--charcoal);
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            margin-top: 5px;
            font-family: 'Georgia', serif;
        }

        .primary-btn:hover {
            background-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .secondary-btn {
            width: 100%;
            padding: 15px;
            background-color: transparent;
            color: var(--charcoal);
            border: 1px solid #eee;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.65rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease-in-out;
            font-family: 'Georgia', serif;
        }

        .secondary-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-2px);
        }

        #output {
            margin-top: 35px;
            padding-top: 30px;
            border-top: 1px solid #f5f5f5;
            display: none;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .breakdown-box {
            background-color: #fafafa;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            font-size: 0.75rem;
        }

        .breakdown-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: #666;
        }

        .sub-label {
            font-size: 0.65rem;
            opacity: 0.75;
            display: block;
            margin-top: 4px;
            margin-bottom: 12px;
        }

        .free-text { color: #28a745; font-weight: bold; text-transform: uppercase; }

        .total-row {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px double #eee;
        }

        .total-price { font-size: 2.2rem; color: var(--charcoal); font-weight: 300; }

        #finalActions { display: none; margin-top: 20px; }

        @media screen and (max-width: 480px) {
            .luxury-card { padding: 30px 20px; }
            .gallery-item { min-width: 220px; height: 220px; }
            .total-price { font-size: 1.85rem; }
            input, select { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="luxury-card">
    <span class="lookbook-label">The Portfolio</span>
    <div class="gallery-container">
        <div class="gallery-scroll" id="gallery">
            <img class="gallery-item" src="insta 1_3.jpg" alt="Pura 1">
            <img class="gallery-item" src="insta 2_20250202_92712107.jpg" alt="Pura 2">
            <img class="gallery-item" src="insta 2 (1)_20250129_1018166.jpg" alt="Pura 3">
        </div>
    </div>
    <div class="pagination-dots" id="dotsContainer"></div>

    <h2>PuraPersonal</h2>
    
    <div class="input-group">
        <label>Expected Guest Count</label>
        <input type="number" id="guests" placeholder="e.g. 500">
    </div>

    <div class="input-group">
        <label>Hospitality Style</label>
        <select id="eventType">
            <option value="1">Minimal (1 bottle/person)</option>
            <option value="2">Executive (2 bottles/person)</option>
            <option value="3" selected>Celebration (3 bottles/person)</option>
        </select>
    </div>

    <button class="primary-btn" onclick="calculateQuote()">Request Proposal</button>

    <div id="output">
        <div id="discountContainer" style="display:none; margin-bottom: 10px;">
            <span id="outDiscount" style="color: var(--gold); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; font-weight: bold;"></span>
        </div>

        <div class="breakdown-box">
            <div class="breakdown-row">
                <div>
                    <span id="bottleSummary">Premium 250ml Bottles</span>
                    <span class="sub-label">(Rs. 6/bottle)</span>
                </div>
                <span id="standardTotal"></span>
            </div>

            <div class="breakdown-row">
                <div>
                    <span id="boxSummary">Packaging</span>
                    <span class="sub-label">(42 Bottles/Box)</span>
                </div>
                <span class="free-text">INCLUDED</span>
            </div>

            <div class="breakdown-row" style="margin-top: 5px;">
                <span>Bespoke Label Design</span>
                <span class="free-text">FREE</span>
            </div>

            <div class="breakdown-row" style="margin-top: 10px;">
                <span>Nagpur Logistics & Delivery</span>
                <span class="free-text">FREE</span>
            </div>

            <div class="breakdown-row" id="savingsRow" style="display:none; color: var(--gold); font-weight: bold; border-top: 1px solid #eee; padding-top: 8px; margin-top: 10px;">
                <span id="savingsLabel">Special Discount</span>
                <span id="savingsAmount"></span>
            </div>
        </div>

        <div class="total-row">
            <label>Final Investment</label>
            <div class="total-price">Rs. <span id="outTotal"></span></div>
            <div style="font-size: 0.75rem; color: #999; margin-top: 5px;">
                Final Rate: Rs. <span id="outRate"></span> / bottle
            </div>
        </div>

        <div id="finalActions">
            <button class="secondary-btn" onclick="generatePDF()">Download Proposal (PDF)</button>
            <button class="primary-btn" onclick="sendOrderWhatsApp()">Place Order Directly</button>
            <a href="tel:+919209812873" style="text-decoration: none;"><button class="secondary-btn">Speak with Us</button></a>
        </div>
    </div>
</div>

<script>
    const gallery = document.getElementById('gallery');
    const container = document.getElementById('dotsContainer');
    const images = gallery.querySelectorAll('img');
    
    function initDots() {
        container.innerHTML = '';
        if (images.length <= 1) return;
        const dotCount = images.length - 1;
        for (let i = 0; i < dotCount; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            container.appendChild(dot);
        }
    }
    initDots();

    gallery.addEventListener('scroll', () => {
        const dots = document.querySelectorAll('.dot');
        if (dots.length === 0) return;
        const maxScroll = gallery.scrollWidth - gallery.clientWidth;
        const scrollFraction = maxScroll > 0 ? gallery.scrollLeft / maxScroll : 0;
        const activeIndex = Math.round(scrollFraction * (dots.length - 1));
        dots.forEach((dot, index) => dot.classList.toggle('active', index === activeIndex));
    });

    function calculateQuote() {
        let guests = document.getElementById('guests').value;
        let consumption = document.getElementById('eventType').value;
        if(guests <= 0 || guests === "") return;

        let totalBottlesNeeded = guests * consumption;
        let totalBoxes = Math.ceil(totalBottlesNeeded / 42);
        let finalBottles = totalBoxes * 42;
        let basePrice = 6.00;
        let finalPricePerBottle = (finalBottles >= 2000) ? 5.58 : (finalBottles >= 1000) ? 5.82 : 6.00;

        let standardRevenue = finalBottles * basePrice;
        let finalRevenue = finalBottles * finalPricePerBottle;
        let totalSavings = standardRevenue - finalRevenue;

        // Added 250ml here
        document.getElementById('bottleSummary').innerText = `Premium 250ml ${finalBottles} Bottles`;
        document.getElementById('boxSummary').innerText = `Packaging: ${totalBoxes} Boxes`;
        document.getElementById('standardTotal').innerText = "Rs. " + standardRevenue.toLocaleString('en-IN');
        document.getElementById('outRate').innerText = finalPricePerBottle.toFixed(2);
        
        if (totalSavings > 0) {
            document.getElementById('savingsRow').style.display = 'flex';
            document.getElementById('savingsLabel').innerText = (finalBottles >= 2000) ? "Special Discount (7%)" : "Special Discount (3%)";
            document.getElementById('savingsAmount').innerText = "- Rs. " + Math.round(totalSavings).toLocaleString('en-IN');
            document.getElementById('discountContainer').style.display = 'block';
            document.getElementById('outDiscount').innerText = (finalBottles >= 2000) ? "Elite Volume Curation" : "Signature Partner Rate";
        } else {
            document.getElementById('savingsRow').style.display = 'none';
            document.getElementById('discountContainer').style.display = 'none';
        }
        
        document.getElementById('outTotal').innerText = Math.round(finalRevenue).toLocaleString('en-IN');
        document.getElementById('output').style.display = 'block';
        document.getElementById('finalActions').style.display = 'block';
        setTimeout(() => { document.getElementById('output').scrollIntoView({ behavior: 'smooth' }); }, 100);
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const guests = document.getElementById('guests').value;
        const consumption = document.getElementById('eventType').value;
        let finalBottles = Math.ceil((guests * consumption) / 42) * 42;
        let totalBoxes = Math.ceil(finalBottles / 42);
        let rate = (finalBottles >= 2000) ? 5.58 : (finalBottles >= 1000) ? 5.82 : 6.00;
        let finalRevenue = Math.round(finalBottles * rate);
        let standardTotalVal = finalBottles * 6;
        let savingsVal = standardTotalVal - finalRevenue;
        let date = new Date().toLocaleDateString();

        doc.setFont("times", "bold").setFontSize(26).setTextColor(26).text("PURAPERSONAL", 105, 40, { align: "center", charSpace: 2 });
        doc.setFont("times", "italic").setFontSize(10).setTextColor(150).text("Your Customized Water Bottle | Nagpur, India", 105, 48, { align: "center" });
        doc.setDrawColor(230).line(40, 55, 170, 55);

        doc.setFont("times", "normal").setFontSize(10).setTextColor(100).text(`DATE: ${date}`, 40, 70);
        doc.text(`CLIENT CAPACITY: ${guests} GUESTS`, 40, 76);
        
        doc.setFont("helvetica", "bold").setFontSize(9).setTextColor(178, 148, 94).text("SERVICE DESCRIPTION", 40, 95);
        doc.text("INVESTMENT", 170, 95, { align: "right" });
        doc.setDrawColor(178, 148, 94).setLineWidth(0.5).line(40, 98, 170, 98);

        doc.setFont("times", "normal").setFontSize(11).setTextColor(26);
        // Added 250ml here
        doc.text(`Premium 250ml ${finalBottles} Bottles`, 40, 110);
        doc.text(`Rs. ${standardTotalVal.toLocaleString('en-IN')}`, 170, 110, { align: "right" });
        doc.setFontSize(9).setTextColor(150).text(`(Rs. 6/bottle)`, 40, 115);
        
        let currentY = 125;
        if (savingsVal > 0) {
            doc.setFont("times", "bold").setFontSize(11).setTextColor(178, 148, 94);
            let discLabel = (finalBottles >= 2000) ? "Special Discount (7%)" : "Special Discount (3%)";
            doc.text(discLabel, 40, currentY);
            doc.text(`- Rs. ${savingsVal.toLocaleString('en-IN')}`, 170, currentY, { align: "right" });
            currentY += 10;
        }

        doc.setFont("times", "normal").setFontSize(10).setTextColor(26);
        doc.text(`Packaging: ${totalBoxes} Boxes`, 40, currentY);
        doc.text("INCLUDED", 170, currentY, { align: "right" });
        doc.setFontSize(9).setTextColor(150).text(`(42 Bottles/Box)`, 40, currentY + 5);
        currentY += 15;
        
        doc.setFontSize(10).setTextColor(26);
        doc.text("Bespoke Label Design", 40, currentY);
        doc.text("FREE", 170, currentY, { align: "right" });
        currentY += 10;
        
        doc.text("Nagpur Logistics & Delivery", 40, currentY);
        doc.text("FREE", 170, currentY, { align: "right" });

        doc.setDrawColor(230).setLineWidth(0.1).line(40, 175, 170, 175);
        doc.setFont("times", "bold").setFontSize(14).setTextColor(26).text("FINAL PROJECT INVESTMENT", 40, 188);
        doc.text(`Rs. ${finalRevenue.toLocaleString('en-IN')}`, 170, 188, { align: "right" });
        doc.setFont("times", "italic").setFontSize(9).setTextColor(150).text(`*Applied Rate: Rs. ${rate.toFixed(2)} per bottle`, 40, 195);

        doc.setFont("times", "italic").setFontSize(10).setTextColor(100).text("Best quality and premium logistics.", 105, 220, { align: "center" });
        doc.setFont("times", "bold").setTextColor(26).text("CONTACT: +91 9209812873", 105, 216, { align: "center" });

        doc.save(`PuraPersonal_Proposal.pdf`);
    }

    function sendOrderWhatsApp() {
        const guests = document.getElementById('guests').value;
        const total = document.getElementById('outTotal').innerText;
        const rate = document.getElementById('outRate').innerText;
        let finalBottles = Math.ceil((guests * document.getElementById('eventType').value) / 42) * 42;
        let totalBoxes = Math.ceil(finalBottles / 42);

        let message = `Hello PuraPersonal! %0A%0AI have reviewed the Lookbook and would like to order: %0A%0A` +
                      `• Capacity: ${guests} Guests %0A` +
                      `• Quantity: ${finalBottles} Bottles (250ml) %0A` +
                      `• Packaging: ${totalBoxes} Boxes (42 per box) %0A` +
                      `• Investment: Rs. ${total} %0A%0A` +
                      `Please connect with me to finalize the bespoke design!`;
        window.open(`https://wa.me/919209812873?text=${message}`, '_blank');
    }
</script>

</body>
</html>
