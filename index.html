<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PuraPersonal | Event Hydration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --gold: #b2945e;
            --charcoal: #1a1a1a;
            --off-white: #ffffff;
            --soft-grey: #f9f9f9;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Georgia', serif;
            background-color: #f8f8f8;
            color: var(--charcoal);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Better for scrolling on mobile */
            min-height: 100vh;
            margin: 0;
            padding: 20px 15px; /* Added side padding for mobile */
            box-sizing: border-box;
        }

        .luxury-card {
            background: var(--off-white);
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            border-radius: 0;
            box-shadow: 0 40px 80px rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
        }

        .lookbook-label {
            font-size: 0.55rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ccc;
            margin-bottom: 15px;
            display: block;
        }

        .gallery-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch; /* Smooth scroll for iOS */
        }
        .gallery-scroll::-webkit-scrollbar { display: none; }

        .gallery-item {
            min-width: 140px;
            height: 140px;
            background-color: #fdfdfd;
            border: 1px solid #f0f0f0;
            object-fit: cover;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-size: 1rem;
            color: var(--charcoal);
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #aaa;
        }

        input, select {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid #eaeaea;
            background: transparent;
            font-size: 1rem;
            color: var(--charcoal);
            outline: none;
            cursor: pointer;
            font-family: 'Georgia', serif;
            border-radius: 0; /* Prevents iOS rounding */
            -webkit-appearance: none; /* Uniform styling for iOS */
        }

        .primary-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--charcoal);
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 5px;
            font-family: 'Georgia', serif;
        }

        .secondary-btn {
            width: 100%;
            padding: 15px;
            background-color: transparent;
            color: var(--charcoal);
            border: 1px solid #eee;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.65rem;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Georgia', serif;
        }

        /* MOBILE SPECIFIC OVERRIDES */
        @media screen and (max-width: 480px) {
            .luxury-card {
                padding: 30px 20px;
            }
            .total-price {
                font-size: 1.75rem;
            }
            input, select {
                font-size: 16px; /* Prevents auto-zoom on iPhone */
            }
        }

        #output {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #f5f5f5;
            display: none;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .breakdown-box {
            background-color: #fafafa;
            padding: 15px;
            margin: 20px 0;
            border-radius: 0;
            text-align: left;
            font-size: 0.75rem;
        }

        .breakdown-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #666;
        }

        .free-text {
            color: #28a745;
            font-weight: bold;
        }

        .total-row {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px double #eee;
        }

        .total-price {
            font-size: 2rem;
            color: var(--charcoal);
            font-weight: 300;
        }

        #finalActions { display: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="luxury-card">
    <span class="lookbook-label">The Portfolio</span>
    <div class="gallery-scroll">
        <img class="gallery-item" src="insta 1_3.jpg" alt="Pura 1">
        <img class="gallery-item" src="insta 2_20250202_92712107.jpg" alt="Pura 2">
        <img class="gallery-item" src="insta 2 (1)_20250129_1018166.jpg" alt="Pura 3">
    </div>

    <h2>PuraPersonal</h2>
    
    <div class="input-group">
        <label>Expected Guest Count</label>
        <input type="number" id="guests" placeholder="e.g. 500">
    </div>

    <div class="input-group">
        <label>Hospitality Style</label>
        <select id="eventType">
            <option value="1">Minimal (1 bottle/person)</option>
            <option value="2">Executive (2 bottles/person)</option>
            <option value="3" selected>Celebration (3 bottles/person)</option>
        </select>
    </div>

    <button class="primary-btn" onclick="calculateQuote()">Request Proposal</button>

    <div id="output">
        <div id="discountContainer" style="display:none; margin-bottom: 10px;">
            <span id="outDiscount" style="color: var(--gold); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; font-weight: bold;"></span>
        </div>

        <div class="breakdown-box">
            <div class="breakdown-row"><span id="bottleSummary">Bottles</span><span id="standardTotal"></span></div>
            <div class="breakdown-row"><span id="boxSummary">Packaging</span><span class="free-text">INCLUDED</span></div>
            <div class="breakdown-row"><span>Label Design</span><span class="free-text">FREE</span></div>
            <div class="breakdown-row"><span>Nagpur Delivery</span><span class="free-text">FREE</span></div>
            <div class="breakdown-row" id="savingsRow" style="display:none; color: var(--gold); font-weight: bold; border-top: 1px solid #eee; padding-top: 8px; margin-top: 5px;">
                <span id="savingsLabel">Discount</span><span id="savingsAmount"></span>
            </div>
        </div>

        <div class="total-row">
            <label>Final Investment</label>
            <div class="total-price">Rs. <span id="outTotal"></span></div>
            <div style="font-size: 0.75rem; color: #999; margin-top: 5px;">
                Final Rate: Rs. <span id="outRate"></span> / bottle
            </div>
        </div>

        <div id="finalActions">
            <button class="secondary-btn" onclick="generatePDF()">Download Proposal (PDF)</button>
            <button class="primary-btn" onclick="sendOrderWhatsApp()">Place Order Directly</button>
            <a href="tel:+919209812873" style="text-decoration: none;"><button class="secondary-btn">Speak with Us</button></a>
        </div>
    </div>
</div>

<script>
    function calculateQuote() {
        let guests = document.getElementById('guests').value;
        let consumption = document.getElementById('eventType').value;
        if(guests <= 0 || guests === "") return;

        let totalBottlesNeeded = guests * consumption;
        let totalBoxes = Math.ceil(totalBottlesNeeded / 42);
        let finalBottles = totalBoxes * 42;
        let basePrice = 6.00;
        let finalPricePerBottle = 6.00; 
        let headline = "";
        let percLabel = "";

        if (finalBottles >= 2000) { finalPricePerBottle = 5.58; headline = "Elite Volume Curation"; percLabel = "Special Discount (7%)"; } 
        else if (finalBottles >= 1000) { finalPricePerBottle = 5.82; headline = "Signature Partner Rate"; percLabel = "Special Discount (3%)"; }

        let standardRevenue = finalBottles * basePrice;
        let finalRevenue = finalBottles * finalPricePerBottle;
        let totalSavings = standardRevenue - finalRevenue;

        document.getElementById('bottleSummary').innerText = `${finalBottles} Premium Bottles`;
        document.getElementById('boxSummary').innerText = `${totalBoxes} Boxes (42 per box)`;
        document.getElementById('standardTotal').innerText = "Rs. " + standardRevenue.toLocaleString('en-IN');
        document.getElementById('outRate').innerText = finalPricePerBottle.toFixed(2);
        
        if (totalSavings > 0) {
            document.getElementById('savingsRow').style.display = 'flex';
            document.getElementById('savingsLabel').innerText = percLabel;
            document.getElementById('savingsAmount').innerText = "- Rs. " + Math.round(totalSavings).toLocaleString('en-IN');
            document.getElementById('discountContainer').style.display = 'block';
            document.getElementById('outDiscount').innerText = headline;
        } else {
            document.getElementById('savingsRow').style.display = 'none';
            document.getElementById('discountContainer').style.display = 'none';
        }
        
        document.getElementById('outTotal').innerText = Math.round(finalRevenue).toLocaleString('en-IN');
        document.getElementById('output').style.display = 'block';
        document.getElementById('finalActions').style.display = 'block';

        setTimeout(() => { document.getElementById('output').scrollIntoView({ behavior: 'smooth' }); }, 100);
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const guests = document.getElementById('guests').value;
        const consumption = document.getElementById('eventType').value;
        let finalBottles = Math.ceil((guests * consumption) / 42) * 42;
        let rate = (finalBottles >= 2000) ? 5.58 : (finalBottles >= 1000) ? 5.82 : 6.00;
        let total = Math.round(finalBottles * rate).toLocaleString('en-IN');

        doc.setFont("times", "bold").setFontSize(26).text("PURAPERSONAL", 105, 40, { align: "center" });
        doc.setFont("times", "italic").setFontSize(10).setTextColor(150).text("Customized Water Bottle | Nagpur, India", 105, 48, { align: "center" });
        doc.setDrawColor(230).line(40, 55, 170, 55);
        
        doc.setFont("times", "normal").setFontSize(11).setTextColor(26).text(`Premium 250ml Bottles (${finalBottles} bottles)`, 40, 110);
        doc.text(`Rs. ${total}`, 170, 110, { align: "right" });
        doc.setFontSize(14).setFont("times", "bold").text("FINAL INVESTMENT", 40, 168);
        doc.text(`Rs. ${total}`, 170, 168, { align: "right" });
        doc.setFontSize(10).setFont("times", "italic").text("Best quality and premium logistics.", 105, 210, { align: "center" });
        doc.setFont("times", "bold").text("CONTACT: +91 9209812873", 105, 216, { align: "center" });
        doc.save(`PuraPersonal_Proposal.pdf`);
    }

    function sendOrderWhatsApp() {
        const guests = document.getElementById('guests').value;
        const total = document.getElementById('outTotal').innerText;
        const rate = document.getElementById('outRate').innerText;
        let message = `Hello PuraPersonal! %0A%0AI have reviewed the Lookbook: %0A` +
                      `• Event: ${guests} Guests %0A` +
                      `• Final Rate: Rs. ${rate}/bottle %0A` +
                      `• Total Investment: Rs. ${total}%0A%0A` +
                      `Please connect with me!`;
        window.open(`https://wa.me/919209812873?text=${message}`, '_blank');
    }
</script>

</body>
</html>
